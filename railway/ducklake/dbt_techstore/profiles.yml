techstore:
  target: prod
  outputs:
    prod:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/app/output/lake.duckdb') }}"
      threads: 2
      settings:
        memory_limit: '20GB'
        temp_directory: '/tmp/duckdb_spill'
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', './output/lake.duckdb') }}"
      threads: 4
